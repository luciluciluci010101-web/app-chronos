<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Chronos - Atlante Globale</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script src="citta.js"></script>
    <script src="guerre.js"></script>
    <script src="disastri.js"></script>
    <script src="popolazioni.js"></script> <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #050505; font-family: sans-serif; overflow: hidden; }
        
        #map { position: fixed !important; top: 0; bottom: 0; left: 0; right: 0; height: 100vh !important; width: 100vw !important; z-index: 1; }
        
        /* 🚨 TRUCCO FONDAMENTALE PER LE ANIMAZIONI IN LEAFLET */
        .leaflet-marker-icon, .leaflet-data-marker { 
            overflow: visible !important; 
            background: transparent; 
            border: none; 
        }

        /* Icone generali sulla mappa */
        .emoji-marker {
            font-size: 24px;
            text-align: center;
            line-height: 1;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.8));
            transition: transform 0.2s ease;
            cursor: pointer;
        }
        .emoji-marker:active { transform: scale(1.3); }

        /* ⚔️ ANIMAZIONE DELLE SPADE FORZATA */
        .animazione-spada {
            display: inline-block !important; /* Forzato per evitare blocchi */
            animation: scontroSpade 0.8s ease-in-out infinite alternate !important;
            transform-origin: center center;
            will-change: transform;
        }

        @keyframes scontroSpade {
            0% { transform: rotate(-15deg) scale(1); }
            100% { transform: rotate(15deg) scale(1.2); filter: drop-shadow(0px 0px 8px rgba(212,175,55,0.9)); }
        }

        #filtri-container {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000;
            display: flex; gap: 6px; background: rgba(10, 10, 10, 0.9); padding: 8px 12px;
            border-radius: 20px; border: 1px solid #d4af37; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            width: 90%; max-width: 400px; justify-content: space-around;
        }
        .btn-filtro { background: transparent; border: none; color: #888; padding: 6px 10px; font-size: 12px; border-radius: 15px; cursor: pointer; white-space: nowrap; }
        .btn-filtro.active { color: #d4af37; background: rgba(212, 175, 55, 0.2); font-weight: bold; }

        #pannello-info {
            position: absolute; top: 75px; right: 15px; left: 15px; max-height: 25vh; z-index: 1000;
            background: rgba(10, 10, 10, 0.95); border: 1px solid #d4af37; border-radius: 10px;
            padding: 15px; display: none; overflow-y: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        @media (min-width: 600px) { #pannello-info { left: auto; width: 280px; max-height: 50vh; } }
        #pannello-info h2 { color: #d4af37; margin: 0 0 5px 0; font-size: 18px; }
        #pannello-info p { margin: 0; font-size: 14px; color: #ccc; }
        
        /* 📱 TIMELINE ULTRA-COMPATTA ED ELEGANTE */
        #timeline-container {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: rgba(15, 15, 15, 0.85); padding: 10px 16px; border-radius: 12px;
            width: 80%; max-width: 320px; text-align: center; border: 1px solid rgba(212, 175, 55, 0.3);
            box-shadow: 0 8px 25px rgba(0, 0, 0, 0.7); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        
        .controllo-superiore { display: flex; align-items: center; justify-content: center; gap: 8px; }
        
        #anno-input { 
            font-size: 20px; font-weight: bold; color: #d4af37; background: transparent;
            border: none; outline: none; text-align: center; width: 130px;
            text-shadow: 0 0 8px rgba(212, 175, 55, 0.3); font-family: 'Georgia', serif;
            cursor: pointer; padding: 2px; border-bottom: 1px dashed rgba(212, 175, 55, 0.3);
        }
        #anno-input:focus { border-bottom: 1px solid #d4af37; background: rgba(212, 175, 55, 0.05); }
        
        .micro-freccia {
            background: transparent; border: none; color: rgba(212, 175, 55, 0.7);
            font-size: 16px; cursor: pointer; padding: 0 8px; transition: color 0.2s;
            display: flex; align-items: center; justify-content: center;
        }
        .micro-freccia:active { color: #ffffff; }
        
        #timeline {
            -webkit-appearance: none; appearance: none; width: 100%; height: 4px; 
            background: rgba(212, 175, 55, 0.15); border-radius: 5px; outline: none; margin-top: 10px;
        }
        #timeline::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 16px; height: 16px; border-radius: 50%;
            background: #d4af37; cursor: pointer; box-shadow: 0 0 8px rgba(212, 175, 55, 0.7); border: 2px solid #0f0f0f;
        }
        #timeline::-moz-range-thumb {
            width: 14px; height: 14px; border-radius: 50%; background: #d4af37; cursor: pointer;
            box-shadow: 0 0 8px rgba(212, 175, 55, 0.7); border: 2px solid #0f0f0f;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="filtri-container">
        <button class="btn-filtro active" id="btn-tutto" onclick="filtra('tutto')">Tutto</button>
        <button class="btn-filtro" id="btn-citta" onclick="filtra('citta')">🏛️ Città</button>
        <button class="btn-filtro" id="btn-guerra" onclick="filtra('guerra')">⚔️ Guerre</button>
        <button class="btn-filtro" id="btn-natura" onclick="filtra('natura')">🌋 Natura</button>
    </div>

    <div id="pannello-info">
        <h2 id="info-titolo">Titolo</h2>
        <p id="info-testo">Dettagli...</p>
    </div>

    <div id="timeline-container">
        <div class="controllo-superiore">
            <button class="micro-freccia" onclick="regolaTempo(-1)">◀</button>
            <input type="text" id="anno-input" value="3000 a.C.">
            <button class="micro-freccia" onclick="regolaTempo(1)">▶</button>
        </div>
        <input type="range" id="timeline" min="-3000" max="2026" value="-3000" step="1">
    </div>

    <script>
        var map, markerAttivi = [], cerchiAttivi = [], categoriaAttiva = 'tutto', eventiStorici = [], annoAttualeGlobale = -3000;

        function initMap() {
            var datiCitta = typeof listaCitta !== 'undefined' ? listaCitta : [];
            var datiGuerre = typeof listaGuerre !== 'undefined' ? listaGuerre : [];
            var datiDisastri = typeof listaDisastri !== 'undefined' ? listaDisastri : [];

            eventiStorici = [].concat(datiCitta, datiGuerre, datiDisastri);

            map = L.map('map', { zoomControl: false, fadeAnimation: false }).setView([35, 25], 3);
            
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Esri'
            }).addTo(map);

            setTimeout(function() { map.invalidateSize(true); }, 200);

            document.getElementById('timeline').addEventListener('input', function() {
                impostaAnno(parseInt(this.value), false);
            });

            var inputAnno = document.getElementById('anno-input');
            
            inputAnno.addEventListener('focus', function() {
                this.value = annoAttualeGlobale; 
                this.select();
            });

            inputAnno.addEventListener('keydown', function(e) {
                if (e.key === 'Enter') {
                    this.blur();
                }
            });

            inputAnno.addEventListener('blur', function() {
                var testo = this.value.trim().toLowerCase();
                var numero = parseInt(testo);

                if (isNaN(numero)) {
                    impostaAnno(annoAttualeGlobale, true);
                    return;
                }

                if ((testo.includes('ac') || testo.includes('a.c.')) && numero > 0) {
                    numero = -numero;
                }

                impostaAnno(numero, true);
            });

            impostaAnno(-3000, true);
        }

        window.addEventListener('DOMContentLoaded', initMap);

        function impostaAnno(val, aggiornaTestoInput) {
            if (val < -3000) val = -3000;
            if (val > 2026) val = 2026;

            annoAttualeGlobale = val;
            document.getElementById('timeline').value = val;

            if (aggiornaTestoInput || document.activeElement !== document.getElementById('anno-input')) {
                if (val < 0) {
                    document.getElementById('anno-input').value = Math.abs(val) + " a.C.";
                } else {
                    document.getElementById('anno-input').value = val + " d.C.";
                }
            }

            aggiornaElementi(val);
            disegnaPopolazioni(val); // Disegna i territori
        }

        function regolaTempo(delta) {
            impostaAnno(annoAttualeGlobale + delta, true);
        }

        function mostraDettagli(ev) {
            document.getElementById('info-titolo').innerText = ev.nome;
            document.getElementById('info-testo').innerText = ev.testo;
            document.getElementById('pannello-info').style.display = 'block';
        }

        function filtra(categoria) {
            categoriaAttiva = categoria;
            document.querySelectorAll('.btn-filtro').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + categoria).classList.add('active');
            aggiornaElementi(annoAttualeGlobale);
        }

        // --- MOTORE POPOLAZIONI ---
        function disegnaPopolazioni(anno) {
            cerchiAttivi.forEach(c => map.removeLayer(c));
            cerchiAttivi = [];

            if (typeof listaPopolazioni === 'undefined') return;

            listaPopolazioni.forEach(pop => {
                let raggio = 0;
                let pre = null, post = null;

                for (let i = 0; i < pop.storia.length; i++) {
                    if (pop.storia[i].anno <= anno) pre = pop.storia[i];
                    if (pop.storia[i].anno >= anno && post === null) post = pop.storia[i];
                }

                if (pre && post) {
                    if (pre.anno === post.anno) raggio = pre.raggio;
                    else {
                        let perc = (anno - pre.anno) / (post.anno - pre.anno);
                        raggio = pre.raggio + (perc * (post.raggio - pre.raggio));
                    }
                } else if (pre && !post && anno === pre.anno) raggio = pre.raggio;

                if (raggio > 0) {
                    let cerchio = L.circle(pop.coordinate, {
                        color: pop.colore, fillColor: pop.colore, fillOpacity: 0.3, weight: 2, radius: raggio
                    }).addTo(map);
                    
                    cerchio.on('click', () => {
                        document.getElementById('info-titolo').innerText = pop.nome;
                        document.getElementById('info-testo').innerText = "Estensione nell'anno: " + (anno < 0 ? Math.abs(anno) + " a.C." : anno + " d.C.");
                        document.getElementById('pannello-info').style.display = 'block';
                    });
                    cerchiAttivi.push(cerchio);
                }
            });
        }

        function aggiornaElementi(annoSelezionato) {
            markerAttivi.forEach(m => map.removeLayer(m));
            markerAttivi = [];

            eventiStorici.forEach(ev => {
                var annoValido = Math.abs(annoSelezionato - ev.anno) <= 150;
                var categoriaValida = (categoriaAttiva === 'tutto' || categoriaAttiva === ev.tipo);

                if (annoValido && categoriaValida) {
                    var emojiScelta = '🏛️';
                    var divClasse = 'emoji-marker'; // Inizializziamo solo con la classe base

                    if (ev.tipo === 'guerra') {
                        emojiScelta = '⚔️';
                        divClasse += ' animazione-spada'; // Aggiungiamo la classe animata
                    } else if (ev.tipo === 'natura') {
                        emojiScelta = '🌋';
                    }

                    var iconaEmoji = L.divIcon({
                        html: '<div class="' + divClasse + '">' + emojiScelta + '</div>',
                        className: 'leaflet-data-marker', // Questo contenitore ora permette overflow visible
                        iconSize: [30, 30],
                        iconAnchor: [15, 15]
                    });

                    var marker = L.marker(ev.coordinate, { icon: iconaEmoji }).addTo(map);
                    marker.on('click', function() { mostraDettagli(ev); });
                    markerAttivi.push(marker);
                }
            });
        }
    </script>
</body>
</html>
