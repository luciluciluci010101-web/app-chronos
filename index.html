<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <!-- Questo meta tag impedisce al telefono di fare zoom strani all'avvio -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Chronos - Atlante Storico</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #0b0b0b; font-family: Arial, sans-serif; overflow: hidden; }
        #map { height: 100%; width: 100%; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* 🛡️ LO SCUDO ANTISTORTO: Blocca qualsiasi tentativo del telefono di deformare la mappa */
        .leaflet-container img {
            max-width: none !important;
            max-height: none !important;
            box-shadow: none !important;
        }
        .leaflet-tile {
            visibility: inherit !important;
        }

        /* Menu dei Filtri in alto */
        #filtri-container {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000;
            display: flex; gap: 8px; background: rgba(15, 15, 15, 0.85); padding: 8px 16px;
            border-radius: 20px; border: 1px solid #d4af37; backdrop-filter: blur(5px);
        }
        .btn-filtro {
            background: transparent; border: none; color: #aaa; padding: 6px 12px;
            font-size: 13px; border-radius: 15px; cursor: pointer; transition: all 0.2s;
        }
        .btn-filtro.active { color: #d4af37; background: rgba(212, 175, 55, 0.15); }

        /* Pannello Informativo: Adattato sia per PC che per Telefono */
        #pannello-info {
            position: absolute; top: 75px; right: 15px; left: 15px; max-height: 25vh; z-index: 1000;
            background: rgba(15, 15, 15, 0.90); border: 1px solid #d4af37; border-radius: 10px;
            padding: 15px; display: none; overflow-y: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.5);
            backdrop-filter: blur(10px);
        }
        /* Se lo schermo è grande (PC), si sposta elegantemente a destra */
        @media (min-width: 600px) {
            #pannello-info { left: auto; width: 280px; max-height: 60vh; }
        }
        #pannello-info h2 { color: #d4af37; margin: 0 0 8px 0; font-size: 18px; }
        #pannello-info p { margin: 0; font-size: 14px; color: #ccc; line-height: 1.4; }
        
        /* Linea del Tempo in basso */
        #timeline-container {
            position: absolute; bottom: 25px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: rgba(15, 15, 15, 0.9); padding: 15px; border-radius: 12px;
            width: 85%; max-width: 450px; text-align: center; border: 1px solid #d4af37; box-shadow: 0 5px 15px rgba(0,0,0,0.5);
        }
        #timeline { width: 100%; accent-color: #d4af37; margin-top: 8px; }
        #anno-display { font-size: 20px; font-weight: bold; color: #d4af37; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="filtri-container">
        <button class="btn-filtro active" id="btn-tutto" onclick="filtra('tutto')">Mostra Tutto</button>
        <button class="btn-filtro" id="btn-citta" onclick="filtra('citta')">🏛️ Città</button>
        <button class="btn-filtro" id="btn-guerra" onclick="filtra('guerra')">⚔️ Guerre</button>
    </div>

    <div id="pannello-info">
        <h2 id="info-titolo">Titolo</h2>
        <p id="info-testo">Dettagli...</p>
    </div>

    <div id="timeline-container">
        <div>ANNO <span id="anno-display">1300 a.C.</span></div>
        <input type="range" id="timeline" min="-3000" max="-1000" value="-1300" step="50">
    </div>

    <script>
        var map;
        var markerAttivi = [];
        var categoriaAttiva = 'tutto';

        var eventiStorici = [
            {
                nome: "Battaglia di Kadesh",
                tipo: "guerra",
                anno: -1274,
                coordinate: [34.56, 36.52],
                testo: "Il più grande scontro di carri della storia antica. Ramses II affronta l'Impero Ittita in una battaglia strategica che porterà al primo trattato di pace internazionale."
            },
            {
                nome: "Tebe Imperiale",
                tipo: "citta",
                anno: -1300,
                coordinate: [25.6872, 32.6396],
                testo: "Nel cuore del Nuovo Regno, Tebe diventa una megalopoli splendida. Oro e tributi confluiscono nei templi di Karnak, mentre i Re vengono sepolti nella Valle dei Re."
            }
        ];

        // Avviamo tutto SOLO quando la pagina è caricata al 100%
        window.onload = function() {
            map = L.map('map', { zoomControl: false }).setView([26.8206, 30.8025], 5);
            
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Esri'
            }).addTo(map);

            // Forza il raddrizzamento immediato delle tessere della mappa
            setTimeout(function() {
                map.invalidateSize();
            }, 300);

            // Collega l'evento allo slider
            document.getElementById('timeline').addEventListener('input', function() {
                var val = parseInt(this.value);
                document.getElementById('anno-display').innerText = Math.abs(val) + " a.C.";
                aggiornaElementi(val);
            });

            // Caricamento iniziale
            aggiornaElementi(-1300);
        };

        function mostraDettagli(ev) {
            document.getElementById('info-titolo').innerText = ev.nome;
            document.getElementById('info-testo').innerText = ev.testo;
            document.getElementById('pannello-info').style.display = 'block';
        }

        function filtra(categoria) {
            categoriaAttiva = categoria;
            
            // Aggiorna l'aspetto dei pulsanti filtro
            document.querySelectorAll('.btn-filtro').forEach(btn => btn.classList.remove('active'));
            if(categoria === 'tutto') document.getElementById('btn-tutto').classList.add('active');
            if(categoria === 'citta') document.getElementById('btn-citta').classList.add('active');
            if(categoria === 'guerra') document.getElementById('btn-guerra').classList.add('active');

            var annoCorrente = parseInt(document.getElementById('timeline').value);
            aggiornaElementi(annoCorrente);
        }

        function aggiornaElementi(annoSelezionato) {
            markerAttivi.forEach(m => map.removeLayer(m));
            markerAttivi = [];

            eventiStorici.forEach(ev => {
                // Mostra il punto se l'anno è vicino E se corrisponde al filtro selezionato
                var annoValido = Math.abs(annoSelezionato - ev.anno) <= 200;
                var categoriaValida = (categoriaAttiva === 'tutto' || categoriaAttiva === ev.tipo);

                if (annoValido && categoriaValida) {
                    var marker = L.circleMarker(ev.coordinate, {
                        radius: 10,
                        fillColor: ev.tipo === 'guerra' ? '#ff4d4d' : '#d4af37',
                        color: '#fff',
                        weight: 2,
                        fillOpacity: 0.9
                    }).addTo(map);

                    marker.on('click', function() { mostraDettagli(ev); });
                    markerAttivi.push(marker);
                }
            });
        }
    </script>
</body>
</html>
