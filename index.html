<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chronos - Atlante Storico</title>
    
    <!-- Carichiamo prima di tutto i file di Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; font-family: Arial, sans-serif; background: #0b0b0b; color: #e0e0e0; overflow: hidden; }
        #map { height: 100vh; width: 100%; position: absolute; top:0; bottom:0; }
        
        /* Menu dei Filtri in alto */
        #filtri-container {
            position: absolute; top: 20px; left: 50%; transform: translateX(-50%); z-index: 1000;
            display: flex; gap: 10px; background: rgba(15, 15, 15, 0.85); padding: 10px 20px;
            border-radius: 30px; border: 1px solid #d4af37; backdrop-filter: blur(5px);
        }
        .btn-filtro {
            background: transparent; border: none; color: #aaa; padding: 8px 16px; cursor: pointer;
            font-size: 14px; border-radius: 20px; transition: all 0.3s;
        }
        .btn-filtro.active, .btn-filtro:hover { color: #d4af37; background: rgba(212, 175, 55, 0.15); }

        /* Pannello Informativo Laterale */
        #pannello-info {
            position: absolute; top: 20px; right: 20px; width: 300px; max-height: 70vh; z-index: 1000;
            background: rgba(15, 15, 15, 0.9); border: 1px solid #d4af37; border-radius: 12px;
            padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.7); display: none; backdrop-filter: blur(10px);
        }
        #pannello-info h2 { color: #d4af37; margin-top: 0; font-size: 20px; }
        
        /* Linea del Tempo in basso */
        #timeline-container {
            position: absolute; bottom: 40px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: rgba(15, 15, 15, 0.9); padding: 20px; border-radius: 16px;
            width: 80%; max-width: 500px; text-align: center; border: 1px solid #d4af37;
        }
        #timeline { width: 100%; accent-color: #d4af37; margin-top: 10px; }
        #anno-display { font-size: 22px; font-weight: bold; color: #d4af37; }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="filtri-container">
        <button class="btn-filtro active" onclick="filtra('tutto')">Mostra Tutto</button>
        <button class="btn-filtro" onclick="filtra('citta')">🏛️ Città</button>
        <button class="btn-filtro" onclick="filtra('guerra')">⚔️ Guerre</button>
    </div>

    <div id="pannello-info">
        <h2 id="info-titolo">Titolo</h2>
        <p id="info-testo">Dettagli...</p>
    </div>

    <div id="timeline-container">
        <div>ANNO <span id="anno-display">1300 a.C.</span></div>
        <input type="range" id="timeline" min="-3000" max="-1000" value="-1300" step="50">
    </div>

    <script>
        // Inizializziamo la mappa
        var map = L.map('map', { zoomControl: false }).setView([26.8206, 30.8025], 6);
        
        // Sfondo satellitare pulito ed elegante
        L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {}).addTo(map);

        // IL TRUCCO ANTISTORTO: Forza la mappa a raddrizzarsi e centrarsi appena la pagina è pronta
        setTimeout(function(){ 
            map.invalidateSize(); 
        }, 500);

        var eventiStorici = [
            {
                nome: "Battaglia di Kadesh",
                tipo: "guerra",
                anno: -1274,
                coordinate: [34.56, 36.52],
                testo: "Il più grande scontro di carri della storia antica. Ramses II affronta l'Impero Ittita in una battaglia strategica che porterà al primo trattato di pace internazionale."
            },
            {
                nome: "Tebe Imperiale",
                tipo: "citta",
                anno: -1300,
                coordinate: [25.6872, 32.6396],
                testo: "Nel cuore del Nuovo Regno, Tebe diventa una megalopoli splendida. Oro e tributi confluiscono nei templi di Karnak, mentre i Re vengono sepolti nella Valle dei Re."
            }
        ];

        var markerAttivi = [];

        function mostraDettagli(evento) {
            document.getElementById('info-titolo').innerText = evento.nome;
            document.getElementById('info-testo').innerText = evento.testo;
            document.getElementById('pannello-info').style.style.display = 'block';
        }

        function aggiornaElementi(annoSelezionato) {
            markerAttivi.forEach(m => map.removeLayer(m));
            markerAttivi = [];

            eventiStorici.forEach(ev => {
                if (Math.abs(annoSelezionato - ev.anno) <= 200) {
                    var marker = L.circleMarker(ev.coordinate, {
                        radius: 9,
                        fillColor: ev.tipo === 'guerra' ? '#ff4d4d' : '#d4af37',
                        color: '#fff',
                        weight: 2,
                        fillOpacity: 0.9
                    }).addTo(map);

                    marker.on('click', function() { mostraDettagli(ev); });
                    markerAttivi.push(marker);
                }
            });
        }

        var slider = document.getElementById('timeline');
        var display = document.getElementById('anno-display');

        slider.addEventListener('input', function() {
            var val = parseInt(this.value);
            display.innerText = Math.abs(val) + " a.C.";
            aggiornaElementi(val);
        });

        aggiornaElementi(-1300);
    </script>
</body>
</html>
