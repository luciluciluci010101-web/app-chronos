<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Chronos - Atlante Globale</title>
    
    <!-- Libreria Mappa Leaflet -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <!-- 🔗 COLLEGAMENTO AI CASSETTI DEI DATI SEPARATI -->
    <script src="citta.js"></script>
    <script src="guerre.js"></script>
    <script src="disastri.js"></script>

    <style>
        body, html { margin: 0; padding: 0; height: 100%; width: 100%; background: #050505; font-family: sans-serif; overflow: hidden; }
        
        #map { position: fixed !important; top: 0; bottom: 0; left: 0; right: 0; height: 100vh !important; width: 100vw !important; z-index: 1; }
        .leaflet-pane { position: absolute !important; left: 0; top: 0; }
        .leaflet-tile { position: absolute !important; left: 0; top: 0; max-width: none !important; max-height: none !important; user-select: none; }
        .leaflet-tile-container { position: absolute !important; left: 0; top: 0; pointer-events: none; }

        .emoji-marker {
            font-size: 24px;
            text-align: center;
            line-height: 1;
            filter: drop-shadow(0px 2px 4px rgba(0,0,0,0.8));
            transition: transform 0.2s ease;
            cursor: pointer;
        }
        .emoji-marker:active { transform: scale(1.3); }

        #filtri-container {
            position: absolute; top: 15px; left: 50%; transform: translateX(-50%); z-index: 1000;
            display: flex; gap: 6px; background: rgba(10, 10, 10, 0.9); padding: 8px 12px;
            border-radius: 20px; border: 1px solid #d4af37; box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            width: 90%; max-width: 400px; justify-content: space-around;
        }
        .btn-filtro { background: transparent; border: none; color: #888; padding: 6px 10px; font-size: 12px; border-radius: 15px; cursor: pointer; white-space: nowrap; }
        .btn-filtro.active { color: #d4af37; background: rgba(212, 175, 55, 0.2); font-weight: bold; }

        #pannello-info {
            position: absolute; top: 75px; right: 15px; left: 15px; max-height: 25vh; z-index: 1000;
            background: rgba(10, 10, 10, 0.95); border: 1px solid #d4af37; border-radius: 10px;
            padding: 15px; display: none; overflow-y: auto; box-shadow: 0 4px 15px rgba(0,0,0,0.6);
        }
        @media (min-width: 600px) { #pannello-info { left: auto; width: 280px; max-height: 50vh; } }
        #pannello-info h2 { color: #d4af37; margin: 0 0 5px 0; font-size: 18px; }
        #pannello-info p { margin: 0; font-size: 14px; color: #ccc; }
        
        /* LINEA DEL TEMPO CON CONTROLLI DI PRECISIONE */
        #timeline-container {
            position: absolute; bottom: 30px; left: 50%; transform: translateX(-50%); z-index: 1000;
            background: rgba(15, 15, 15, 0.85); padding: 16px 20px; border-radius: 16px;
            width: 85%; max-width: 440px; text-align: center; border: 1px solid rgba(212, 175, 55, 0.35);
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.8); backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
        }
        
        #timeline-label { font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 2px; color: #888; margin-bottom: 5px; }
        
        /* Plancia dei pulsanti temporali */
        .plancia-tempo { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 5px; }
        
        #anno-display { 
            font-size: 24px; font-weight: bold; color: #d4af37; min-width: 140px; display: inline-block;
            text-shadow: 0 0 12px rgba(212, 175, 55, 0.4); font-family: 'Georgia', serif; 
        }
        
        /* Pulsanti di regolazione micro e macro */
        .btn-regola {
            background: rgba(212, 175, 55, 0.1); border: 1px solid rgba(212, 175, 55, 0.4);
            color: #d4af37; border-radius: 8px; width: 36px; height: 32px; font-size: 12px;
            font-weight: bold; cursor: pointer; transition: all 0.2s ease; display: flex; align-items: center; justify-content: center;
        }
        .btn-regola:active { background: #d4af37; color: #000; transform: scale(0.95); }
        
        #timeline {
            -webkit-appearance: none; appearance: none; width: 100%; height: 5px; 
            background: rgba(212, 175, 55, 0.2); border-radius: 5px; outline: none; margin-top: 10px;
        }
        #timeline::-webkit-slider-thumb {
            -webkit-appearance: none; appearance: none; width: 20px; height: 20px; border-radius: 50%;
            background: #d4af37; cursor: pointer; box-shadow: 0 0 10px rgba(212, 175, 55, 0.8); border: 2px solid #0f0f0f; transition: transform 0.1s ease;
        }
        #timeline::-webkit-slider-thumb:hover, #timeline::-webkit-slider-thumb:active { transform: scale(1.25); }
        #timeline::-moz-range-thumb {
            width: 16px; height: 16px; border-radius: 50%; background: #d4af37; cursor: pointer;
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.8); border: 2px solid #0f0f0f; transition: transform 0.1s ease;
        }
        #timeline::-moz-range-thumb:hover, #timeline::-moz-range-thumb:active { transform: scale(1.25); }
    </style>
</head>
<body>

    <div id="map"></div>

    <div id="filtri-container">
        <button class="btn-filtro active" id="btn-tutto" onclick="filtra('tutto')">Tutto</button>
        <button class="btn-filtro" id="btn-citta" onclick="filtra('citta')">🏛️ Città</button>
        <button class="btn-filtro" id="btn-guerra" onclick="filtra('guerra')">⚔️ Guerre</button>
        <button class="btn-filtro" id="btn-natura" onclick="filtra('natura')">🌋 Natura</button>
    </div>

    <div id="pannello-info">
        <h2 id="info-titolo">Titolo</h2>
        <p id="info-testo">Dettagli...</p>
    </div>

    <!-- 📦 NUOVA PLANCIA CON PULSANTI DI NAVIGAZIONE MILLESIMALE -->
    <div id="timeline-container">
        <div id="timeline-label">EPOCA</div>
        <div class="plancia-tempo">
            <button class="btn-regola" onclick="regolaTempo(-100)">-100</button>
            <button class="btn-regola" onclick="regolaTempo(-1)">◀</button>
            <span id="anno-display">3000 a.C.</span>
            <button class="btn-regola" onclick="regolaTempo(1)">▶</button>
            <button class="btn-regola" onclick="confermaTempo(100)">+100</button>
        </div>
        <input type="range" id="timeline" min="-3000" max="2026" value="-3000" step="1">
    </div>

    <script>
        var map;
        var markerAttivi = [];
        var categoriaAttiva = 'tutto';
        var eventiStorici = [];

        function initMap() {
            var datiCitta = typeof listaCitta !== 'undefined' ? listaCitta : [];
            var datiGuerre = typeof listaGuerre !== 'undefined' ? listaGuerre : [];
            var datiDisastri = typeof listaDisastri !== 'undefined' ? listaDisastri : [];

            eventiStorici = [].concat(datiCitta, datiGuerre, datiDisastri);

            map = L.map('map', { zoomControl: false, fadeAnimation: false }).setView([35, 25], 3);
            
            L.tileLayer('https://server.arcgisonline.com/ArcGIS/rest/services/World_Imagery/MapServer/tile/{z}/{y}/{x}', {
                attribution: 'Esri'
            }).addTo(map);

            setTimeout(function() { map.invalidateSize(true); }, 200);

            // Sincronizza lo spostamento manuale dello slider
            document.getElementById('timeline').addEventListener('input', function() {
                impostaAnno(parseInt(this.value));
            });

            // Avviamo l'applicazione direttamente dal 3000 a.C.
            impostaAnno(-3000);
        }

        window.addEventListener('DOMContentLoaded', initMap);

        // 🧠 FUNZIONE CENTRALE PER GESTIRE L'ANNO (Unifica slider e pulsanti)
        function impostaAnno(val) {
            if (val < -3000) val = -3000;
            if (val > 2026) val = 2026;

            // Sincronizza graficamente la posizione della levetta
            document.getElementById('timeline').value = val;

            // Aggiorna il testo dell'anno a schermo
            if (val < 0) {
                document.getElementById('anno-display').innerText = Math.abs(val) + " a.C.";
            } else {
                document.getElementById('anno-display').innerText = val + " d.C.";
            }

            // Disegna i punti storici sulla mappa
            aggiornaElementi(val);
        }

        // Funzione attivata dai pulsanti d'oro per fare +1, -1, +100 o -100
        function regolaTempo(delta) {
            var annoCorrente = parseInt(document.getElementById('timeline').value);
            impostaAnno(annoCorrente + delta);
        }
        
        // Correzione per il pulsante +100
        function confermaTempo(delta) {
            regolaTempo(delta);
        }

        function mostraDettagli(ev) {
            document.getElementById('info-titolo').innerText = ev.nome;
            document.getElementById('info-testo').innerText = ev.testo;
            document.getElementById('pannello-info').style.display = 'block';
        }

        function filtra(categoria) {
            categoriaAttiva = categoria;
            document.querySelectorAll('.btn-filtro').forEach(btn => btn.classList.remove('active'));
            document.getElementById('btn-' + categoria).classList.add('active');
            aggiornaElementi(parseInt(document.getElementById('timeline').value));
        }

        function aggiornaElementi(annoSelezionato) {
            markerAttivi.forEach(m => map.removeLayer(m));
            markerAttivi = [];

            eventiStorici.forEach(ev => {
                var annoValido = Math.abs(annoSelezionato - ev.anno) <= 150;
                var categoriaValida = (categoriaAttiva === 'tutto' || categoriaAttiva === ev.tipo);

                if (annoValido && categoriaValida) {
                    var emojiScelta = '🏛️';
                    if (ev.tipo === 'guerra') emojiScelta = '⚔️';
                    if (ev.tipo === 'natura') emojiScelta = '🌋';

                    var iconaEmoji = L.divIcon({
                        html: '<div class="emoji-marker">' + emojiScelta + '</div>',
                        className: 'leaflet-data-marker',
                        iconSize: [30, 30],
                        iconAnchor: [15, 15]
                    });

                    var marker = L.marker(ev.coordinate, { icon: iconaEmoji }).addTo(map);
                    marker.on('click', function() { mostraDettagli(ev); });
                    markerAttivi.push(marker);
                }
            });
        }
    </script>
</body>
</html>
